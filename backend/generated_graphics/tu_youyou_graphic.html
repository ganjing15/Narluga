<svg id="artemisinin-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%"
    style="font-family: system-ui, -apple-system, sans-serif;">
    <defs>
        <!-- Gradients -->
        <linearGradient id="cool-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        <linearGradient id="hot-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f87171" />
            <stop offset="100%" stop-color="#dc2626" />
        </linearGradient>
        <linearGradient id="glass-glare" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="white" stop-opacity="0.6" />
            <stop offset="50%" stop-color="white" stop-opacity="0.1" />
            <stop offset="100%" stop-color="white" stop-opacity="0.4" />
        </linearGradient>

        <!-- Glow Filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Fire Animation -->
        <style>
            @keyframes float {

                0%,
                100% {
                    transform: translateY(0px);
                }

                50% {
                    transform: translateY(-10px);
                }
            }

            @keyframes pulse {

                0%,
                100% {
                    transform: scale(1);
                    opacity: 1;
                }

                50% {
                    transform: scale(1.05);
                    opacity: 0.8;
                }
            }

            @keyframes shake {

                0%,
                100% {
                    transform: translateX(0);
                }

                25% {
                    transform: translateX(-3px) rotate(-5deg);
                }

                75% {
                    transform: translateX(3px) rotate(5deg);
                }
            }

            @keyframes bubbleUp {
                0% {
                    transform: translateY(0);
                    opacity: 0;
                }

                50% {
                    opacity: 1;
                }

                100% {
                    transform: translateY(-40px);
                    opacity: 0;
                }
            }

            .intact-molecule {
                animation: float 3s ease-in-out infinite;
                transition: all 0.5s ease;
            }

            .broken-molecule {
                transition: all 0.5s ease;
            }

            .parasite-alive {
                animation: shake 0.5s infinite;
                transition: all 0.5s ease;
            }

            .parasite-dead {
                transition: all 0.5s ease;
                opacity: 0.2;
                transform: scale(0.5);
            }

            .bubble {
                fill: white;
                opacity: 0;
            }

            .boiling .bubble {
                animation: bubbleUp 1s infinite linear;
            }

            .boiling .bubble:nth-child(2) {
                animation-delay: 0.3s;
            }

            .boiling .bubble:nth-child(3) {
                animation-delay: 0.6s;
            }

            /* Transitions for paths */
            #liquid-fill,
            #flame,
            #mercury {
                transition: all 0.3s ease;
            }
        </style>
    </defs>

    <!-- Background grid/subtle styling (Optional, keeping it clean) -->
    <rect width="800" height="400" fill="transparent" />

    <!-- ================= SECTION 1: THE EXTRACTION FLASK ================= -->
    <g id="extraction-station" transform="translate(50, 50)">
        <!-- Heater Base -->
        <rect x="40" y="250" width="120" height="20" rx="5" fill="#475569" />
        <rect x="50" y="270" width="100" height="10" rx="3" fill="#334155" />

        <!-- Flame -->
        <path id="flame" d="M 100 250 Q 80 230 100 210 Q 120 230 100 250" fill="#ef4444" opacity="0.8"
            transform-origin="100 250" />

        <!-- Flask Liquid (Clipped to Flask Shape) -->
        <clipPath id="flask-clip">
            <path
                d="M 85 50 L 115 50 L 115 120 L 160 230 A 20 20 0 0 1 140 250 L 60 250 A 20 20 0 0 1 40 230 L 85 120 Z" />
        </clipPath>

        <g clip-path="url(#flask-clip)">
            <rect id="liquid-fill" x="20" y="150" width="160" height="120" fill="url(#cool-liquid)" />
            <!-- Bubbles -->
            <g id="bubbles" transform="translate(0, 50)">
                <circle class="bubble" cx="80" cy="180" r="4" />
                <circle class="bubble" cx="100" cy="190" r="6" />
                <circle class="bubble" cx="120" cy="170" r="3" />
            </g>
            <!-- Plant Sprig inside flask -->
            <path
                d="M 100 240 Q 110 180 95 150 M 95 150 Q 85 140 75 145 M 102 190 Q 120 180 125 170 M 98 210 Q 80 200 70 190"
                stroke="#064e3b" stroke-width="4" fill="none" stroke-linecap="round" />
            <!-- Leaves -->
            <ellipse cx="75" cy="145" rx="8" ry="4" fill="#047857" transform="rotate(-20 75 145)" />
            <ellipse cx="125" cy="170" rx="8" ry="4" fill="#047857" transform="rotate(30 125 170)" />
            <ellipse cx="70" cy="190" rx="8" ry="4" fill="#047857" transform="rotate(-30 70 190)" />
        </g>

        <!-- Flask Glass Outline -->
        <path d="M 85 50 L 115 50 L 115 120 L 160 230 A 20 20 0 0 1 140 250 L 60 250 A 20 20 0 0 1 40 230 L 85 120 Z"
            fill="url(#glass-glare)" stroke="#94a3b8" stroke-width="4" stroke-linejoin="round" />
        <rect x="80" y="45" width="40" height="10" rx="3" fill="#94a3b8" />

        <!-- Thermometer -->
        <rect x="10" y="80" width="14" height="150" rx="7" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
        <circle cx="17" cy="235" r="12" fill="#ef4444" />
        <!-- Mercury line -->
        <rect id="mercury" x="14" y="200" width="6" height="30" fill="#ef4444" rx="3" />
        <!-- Tick marks -->
        <line x1="24" y1="100" x2="30" y2="100" stroke="#94a3b8" stroke-width="2" />
        <line x1="24" y1="140" x2="30" y2="140" stroke="#94a3b8" stroke-width="2" />
        <line x1="24" y1="180" x2="30" y2="180" stroke="#94a3b8" stroke-width="2" />

        <!-- Label -->
        <foreignObject x="0" y="290" width="200" height="60">
            <div xmlns="http://www.w3.org/1999/xhtml"
                style="text-align: center; color: #334155; font-weight: bold; font-size: 14px;">
                Qinghao Plant<br />(Sweet Wormwood)
            </div>
        </foreignObject>
    </g>

    <!-- Arrows -->
    <path d="M 240 200 L 290 200" stroke="#cbd5e1" stroke-width="4" stroke-dasharray="6,6" stroke-linecap="round"
        fill="none" />
    <polygon points="290,195 300,200 290,205" fill="#cbd5e1" />

    <path d="M 500 200 L 550 200" stroke="#cbd5e1" stroke-width="4" stroke-dasharray="6,6" stroke-linecap="round"
        fill="none" />
    <polygon points="550,195 560,200 550,205" fill="#cbd5e1" />

    <!-- ================= SECTION 2: THE MOLECULE ================= -->
    <g id="molecule-station" transform="translate(300, 50)">
        <!-- Magnifying Glass -->
        <circle cx="100" cy="150" r="80" fill="#f8fafc" stroke="#64748b" stroke-width="8" />
        <line x1="156" y1="206" x2="200" y2="250" stroke="#64748b" stroke-width="16" stroke-linecap="round" />
        <line x1="160" y1="210" x2="190" y2="240" stroke="#475569" stroke-width="6" stroke-linecap="round" />

        <!-- Intact Artemisinin Molecule -->
        <g id="molecule-intact" class="intact-molecule" transform="translate(100, 150)">
            <!-- Stylized Hexagons -->
            <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#10b981" stroke-width="6"
                stroke-linejoin="round" filter="url(#glow)" />
            <polygon points="-35,20 0,40 -20,70 -55,50" fill="none" stroke="#10b981" stroke-width="6"
                stroke-linejoin="round" />

            <!-- Atoms -->
            <circle cx="0" cy="-40" r="10" fill="#34d399" />
            <circle cx="35" cy="-20" r="8" fill="#059669" />
            <circle cx="35" cy="20" r="8" fill="#059669" />
            <circle cx="0" cy="40" r="12" fill="#34d399" />
            <circle cx="-35" cy="20" r="10" fill="#047857" />
            <circle cx="-35" cy="-20" r="8" fill="#059669" />

            <!-- Peroxide Bridge (The crucial part!) -->
            <line x1="-15" y1="0" x2="15" y2="0" stroke="#ef4444" stroke-width="4" />
            <circle cx="-15" cy="0" r="6" fill="#ef4444" />
            <circle cx="15" cy="0" r="6" fill="#ef4444" />
            <text x="0" y="-10" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">O-O</text>
        </g>

        <!-- Broken Molecule (Hidden by default) -->
        <g id="molecule-broken" class="broken-molecule" transform="translate(100, 150)" opacity="0">
            <!-- Left half -->
            <g transform="translate(-20, 10) rotate(-20)">
                <polyline points="0,-40 -35,-20 -35,20 0,40" fill="none" stroke="#94a3b8" stroke-width="6"
                    stroke-linejoin="round" />
                <circle cx="0" cy="-40" r="10" fill="#cbd5e1" />
                <circle cx="-35" cy="20" r="10" fill="#94a3b8" />
                <circle cx="-35" cy="-20" r="8" fill="#cbd5e1" />
                <circle cx="-15" cy="0" r="6" fill="#f87171" />
            </g>
            <!-- Right half -->
            <g transform="translate(20, -10) rotate(20)">
                <polyline points="0,-40 35,-20 35,20 0,40" fill="none" stroke="#94a3b8" stroke-width="6"
                    stroke-linejoin="round" />
                <circle cx="35" cy="-20" r="8" fill="#cbd5e1" />
                <circle cx="35" cy="20" r="8" fill="#94a3b8" />
                <circle cx="0" cy="40" r="12" fill="#cbd5e1" />
                <circle cx="15" cy="0" r="6" fill="#f87171" />
            </g>
        </g>

        <!-- Label -->
        <foreignObject x="0" y="290" width="200" height="60">
            <div xmlns="http://www.w3.org/1999/xhtml"
                style="text-align: center; color: #334155; font-weight: bold; font-size: 14px;">
                Active Compound<br /><span id="molecule-label" style="color:#059669;">Artemisinin</span>
            </div>
        </foreignObject>
    </g>

    <!-- ================= SECTION 3: THE PARASITES ================= -->
    <g id="patient-station" transform="translate(560, 50)">
        <!-- Blood Drop / Vein View -->
        <path
            d="M 100 70 C 160 70 180 120 180 150 C 180 190 140 230 100 230 C 60 230 20 190 20 150 C 20 120 40 70 100 70 Z"
            fill="#fee2e2" stroke="#fca5a5" stroke-width="6" />

        <!-- Red Blood Cells -->
        <circle cx="60" cy="120" r="20" fill="#f87171" opacity="0.5" />
        <circle cx="140" cy="180" r="25" fill="#f87171" opacity="0.5" />
        <circle cx="100" cy="200" r="15" fill="#f87171" opacity="0.5" />

        <!-- Malaria Parasites (Plasmodium) -->
        <g id="parasite-group" class="parasite-dead" transform-origin="100 150">
            <!-- Parasite 1 -->
            <g transform="translate(90, 130)">
                <circle cx="0" cy="0" r="15" fill="#7c2d12" />
                <circle cx="-5" cy="-5" r="3" fill="#fbbf24" />
                <circle cx="5" cy="-5" r="3" fill="#fbbf24" />
                <path d="M -5 5 Q 0 10 5 5" stroke="#fbbf24" stroke-width="2" fill="none" />
                <!-- Spikes -->
                <line x1="0" y1="-15" x2="0" y2="-20" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />
                <line x1="0" y1="15" x2="0" y2="20" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />
                <line x1="-15" y1="0" x2="-20" y2="0" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />
                <line x1="15" y1="0" x2="20" y2="0" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />
            </g>

            <!-- Parasite 2 -->
            <g transform="translate(130, 160) scale(0.8)">
                <circle cx="0" cy="0" r="15" fill="#7c2d12" />
                <circle cx="-5" cy="-5" r="3" fill="#fbbf24" />
                <circle cx="5" cy="-5" r="3" fill="#fbbf24" />
                <path d="M -5 5 Q 0 10 5 5" stroke="#fbbf24" stroke-width="2" fill="none" />
                <!-- Spikes -->
                <line x1="-10" y1="-10" x2="-15" y2="-15" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />
                <line x1="10" y1="10" x2="15" y2="15" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />
                <line x1="-10" y1="10" x2="-15" y2="15" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />
                <line x1="10" y1="-10" x2="15" y2="-15" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" />
            </g>

            <!-- Parasite 3 -->
            <g transform="translate(60, 170) scale(0.6)">
                <circle cx="0" cy="0" r="15" fill="#7c2d12" />
                <circle cx="-5" cy="-5" r="3" fill="#fbbf24" />
                <circle cx="5" cy="-5" r="3" fill="#fbbf24" />
                <path d="M -5 5 Q 0 10 5 5" stroke="#fbbf24" stroke-width="2" fill="none" />
            </g>
        </g>

        <!-- Label -->
        <foreignObject x="0" y="250" width="200" height="80">
            <div xmlns="http://www.w3.org/1999/xhtml"
                style="text-align: center; color: #334155; font-weight: bold; font-size: 14px;">
                Patient Blood<br /><span id="parasite-label" style="color:#10b981;">Malaria Cleared!</span>
            </div>
        </foreignObject>
    </g>
</svg>
