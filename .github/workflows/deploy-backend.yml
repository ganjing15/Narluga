name: Deploy Backend to GCP VM

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'deploy/deploy-backend.sh'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          eval `ssh-agent -s`
          gcloud compute ssh ${{ secrets.VM_NAME || 'narluga-vm' }} \
            --zone ${{ secrets.VM_ZONE || 'us-central1-a' }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --command="echo 'SSH Keys Configured'"

      - name: Create Backend Environment File
        run: |
          mkdir -p backend
          cat << 'EOF' > backend/.env
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SUPADATA_API_KEY=${{ secrets.SUPADATA_API_KEY }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          DISABLE_AUTH=${{ env.DISABLE_AUTH || 'false' }}
          EOF

      - name: Run Deploy Script
        run: |
          chmod +x ./deploy/deploy-backend.sh
          ./deploy/deploy-backend.sh ${{ secrets.GCP_PROJECT_ID }}
